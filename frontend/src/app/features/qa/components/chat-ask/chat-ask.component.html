<button class="scroll-btn" (click)="scrollRequest.emit()" title="Scroll to bottom">
  <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M4 6L8 10L12 6" stroke="currentColor" stroke-width="1.5"
      stroke-linecap="round" stroke-linejoin="round"/>
  </svg>
</button>

<div class="input-inner">
  <input
    class="input-field"
    [(ngModel)]="query"
    (keydown.enter)="submit()"
    placeholder="Ask your books..."
  />
  <button class="send-btn" (click)="submit()" [disabled]="disabled() || !query.trim()">
    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M22 2L11 13M22 2L15 22L11 13M22 2L2 9L11 13"
        stroke="currentColor" stroke-width="1.8"
        stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>
</div>
