<div class="page">

  <!-- ══ HEADER ══ -->
  <app-header>
    <app-header-filters
      [books]="books()"
      [selectedBookIds]="selectedBookIds()"
      (selectionChange)="selectedBookIds.set($event)"
    />
  </app-header>

  <!-- ══ CHAT AREA ══ -->
  <div class="chat-area" #chatArea>

    @if (!messages().length && !loading()) {
      <div class="empty-state">
        <div class="empty-icon">💬</div>
        <p class="empty-title">Ask your books anything</p>
        <p class="empty-hint">Start a conversation — your library will answer.</p>
      </div>
    }

    @for (msg of messages(); track $index) {
      @if (msg.role === 'user') {
        <app-chat-question [content]="msg.content" />
      }
      @if (msg.role === 'assistant') {
        <app-chat-response [message]="msg" />
      }
    }

    @if (loading()) {
      <app-chat-response [loading]="true" />
    }

  </div>

  <!-- ══ INPUT ══ -->
  <app-chat-ask
    [disabled]="loading()"
    (submitted)="onSubmit($event)"
    (scrollRequest)="scrollToBottom()"
  />

</div>
