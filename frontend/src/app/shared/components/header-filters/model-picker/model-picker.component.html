<div class="overlay" (click)="closed.emit()">
  <div class="dialog" (click)="$event.stopPropagation()">

    <div class="dialog-header">
      <div class="dialog-title-group">
        <span class="dialog-icon">✦</span>
        <h3 class="dialog-title">Select model</h3>
      </div>
      <button class="dialog-close" (click)="closed.emit()">✕</button>
    </div>

    @if (llmModels().length === 0) {
      <div class="empty">
        <p class="empty-text">No models available.</p>
        <p class="empty-hint">Make sure Ollama is running or an API key is configured.</p>
      </div>
    } @else {
      <div class="model-list">
        @for (llmModel of llmModels(); track llmModel.id) {
          <button
            class="model-item"
            [class.selected]="llmModel.id === selectedModelId()"
            (click)="select(llmModel.id)"
          >
            <div class="model-icon" [class]="llmModel.provider">
              {{ providerIcon(llmModel.provider) }}
            </div>
            <div class="model-info">
              <span class="model-name">{{ llmModel.name }}</span>
              <span class="model-provider">{{ providerLabel(llmModel.provider) }}</span>
            </div>
            @if (llmModel.id === selectedModelId()) {
              <span class="model-check">✓</span>
            }
          </button>
        }
      </div>
    }

  </div>
</div>
